<!-- Social Buttons -->

<div class="h-[1px] flex-1 bg-neutral-100"></div>
</div>
<!-- Email Login Form -->
<form class="space-y-5" onsubmit="return false;">
<div class="space-y-3.5">
<div class="relative group">
<span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-neutral-400 group-focus-within:text-primary transition-colors">alternate_email</span>
<input class="w-full pl-14 pr-5 py-4 border border-neutral-100 focus:bg-white focus:ring-4 focus:ring-primary/5 focus:border-primary rounded-xl font-medium placeholder:text-neutral-400 text-neutral-900 transition-all bg-neutral-100" placeholder="Email của bạn nè..." type="email"/>
</div>
<div class="relative group">
<span class="absolute left-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-neutral-400 group-focus-within:text-primary transition-colors">lock</span>
<input class="w-full pl-14 pr-12 py-4 border border-neutral-100 focus:bg-white focus:ring-4 focus:ring-primary/5 focus:border-primary rounded-xl font-medium placeholder:text-neutral-400 text-neutral-900 transition-all bg-neutral-100" placeholder="Mật khẩu bí mật..." type="password"/>
<button class="absolute right-5 top-1/2 -translate-y-1/2 material-symbols-outlined text-neutral-400 hover:text-neutral-600" type="button">visibility</button>
</div>
</div>
<div class="flex items-center justify-between text-sm font-semibold pt-1">
<label class="flex items-center gap-2.5 cursor-pointer group">
<input class="w-5 h-5 rounded-md border-neutral-200 bg-white text-primary focus:ring-primary/20 focus:ring-offset-0" type="checkbox"/>
<span class="text-neutral-600 group-hover:text-neutral-900 transition-colors">Nhớ mặt tui nha</span>
</label>
<a class="text-primary hover:brightness-90 transition-all font-bold" href="#">Quên mật khẩu?</a>

<button class="w-full py-5 px-8 rounded-full bg-primary text-white font-headline text-lg font-black shadow-vibe-3d hover:shadow-2xl hover:shadow-primary/40 hover:-translate-y-1 active:scale-[0.98] transition-all transform flex items-center justify-center gap-3">
                Vào ngay thôi! ✨
            </button>
</form>
<!-- Footer Links -->
<div class="mt-8 text-center">
<p class="text-neutral-600 font-semibold text-base">
                Chưa có tài khoản? 
                <a class="text-primary font-black hover:underline underline-offset-4 ml-1" href="#">Đăng ký ngay</a>
</p>
</div>

<p class="text-[10px] uppercase font-bold tracking-[0.2em] mb-4 drop-shadow-sm">
            © 2024 Mình Đi Đâu Thế? • Một sản phẩm cực chill
        </p>

<a class="hover:text-primary transition-colors" href="#">Về chúng mình</a>
<a class="hover:text-primary transition-colors" href="#">Chính sách</a>
